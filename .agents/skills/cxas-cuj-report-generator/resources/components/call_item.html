<div class="call-item $CALL_TYPE collapsed">
    <div class="call-item-header">
        <strong>$CALL_LABEL:</strong> <span contenteditable="true">$NAME</span>
        <span class="toggle-icon">▼</span>
    </div>
    <div class="call-item-content">
        <div class="payload-section">
            <span class="section-label">Payload:</span>
            <pre><code contenteditable="true">$URL_INFO$PAYLOAD</code></pre>
        </div>
        <div class="response-section">
            <span class="section-label">Response:</span>
            <pre><code contenteditable="true">$RESPONSE</code></pre>
        </div>
    </div>
</div>
