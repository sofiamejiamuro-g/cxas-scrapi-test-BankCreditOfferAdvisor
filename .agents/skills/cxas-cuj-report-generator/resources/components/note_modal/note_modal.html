<!-- Note Modal -->
<div id="noteModal">
    <div class="modal-content">
        <h3>Add Note</h3>
        <p>Selected text: <span id="selectedTextDisplay"></span></p>
        <textarea id="noteInput" rows="5" placeholder="Enter your note here..."></textarea>
        <div class="modal-actions">
            <button onclick="closeNoteModal()">Cancel</button>
            <button onclick="saveNote()" class="btn-primary">Save Note</button>
        </div>
    </div>
</div>
