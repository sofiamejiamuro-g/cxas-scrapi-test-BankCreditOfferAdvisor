# YAML Schema for Transcript Files
# All files generated by subagents must follow this structure.

subintent_id: string # Required. Slug-format identifier (e.g., policy-effective-date)
subintent_name: string # Required. Human-readable name of the sub-intent.
parent_cuj: string # Required. The high-level category (e.g., Benefits & Coverage).
description: string # Optional. Description of the scenario.

turns: # Required. List of dialogue turns.
  - speaker: string # Required. Must be 'Agent' or 'User'.
    text: string # Required. The literal string spoken.
    
    # Optional: Use when the agent invokes a local function.
    tool_call:
      name: string # Required if tool_call present.
      parameters: object # Optional. Key-value pairs of arguments.
      
    # Optional: Use when the agent triggers an external API.
    webhook_call:
      endpoint: string # Required if webhook_call present.
      payload_patch: object # Optional. Key-value pairs to update session state.
      
    # Optional: Use for state transitions or background logic.
    system_action:
      type: string # Required if system_action present.
      reason: string # Optional.
